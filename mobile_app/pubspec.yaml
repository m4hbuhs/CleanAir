name: clean_air_mobile
description: Hyperlocal Pollution Intelligence mobile app designed for low-literacy users.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  # Networking
  dio: ^5.4.0
  
  # Hardware & Media
  record: ^5.0.5          # Voice reporting
  image_picker: ^1.0.7    # Camera snapshots
  geolocator: ^10.1.0     # GPS hardware access
  url_launcher: ^6.2.2    # IVR hotline routing
  
  # Mapping
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # State Management
  provider: ^6.1.1

  # UI Enhancements
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Add asset directories if needed later
  # assets:
  #   - assets/images/
